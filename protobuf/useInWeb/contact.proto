syntax = "proto3";
package contact;

message Add_Request
{
	string name = 1;
    int32 age = 2;
	message Phone
	{
		enum PhoneType
		{
			Mobile_Phone = 0;
			TELEPHONE = 1;
		}
		string number = 1;
		PhoneType type = 2;
	}
    repeated Phone phone_numbsers = 3;
}

message Add_Response
{
	string uuid = 1;
	bool ok = 2;
	string err_desc = 3;
}
