<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易评论系统</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        textarea { width: 100%%; height: 100px; }
        input[type="text"] { width: 300px; padding: 5px; margin: 5px 0; }
        .comment { border-bottom: 1px solid #ccc; margin-bottom: 10px; padding: 10px; }
    </style>
</head>
<body>
<h2>文章：实现评论系统</h2>
<form action="/submit" method="post">
    <input type="text" name="user" placeholder="评论者ID (用户名)" required><br>
    <input type="text" name="article_id" placeholder="文章ID" value="1" required><br>
    <textarea name="content" placeholder="请输入评论内容..." required></textarea><br>
    <button type="submit">提交评论</button>
</form>
<hr>
<h3>评论区</h3>
<!--COMMENTS-->
</body>
</html>
