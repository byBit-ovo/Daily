<!-- 首页 Home -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>流浪动物领养平台 - 首页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1em;
            text-align: center;
        }
        nav a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
        }
        .banner {
            background-color: #ffd54f;
            padding: 2em;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
        }
        .search {
            text-align: center;
            margin: 20px 0;
        }
        .search input {
            padding: 10px;
            width: 200px;
            margin-right: 10px;
        }
        .search button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .animal-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .animal-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 200px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .animal-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .animal-card h3 {
            margin: 10px 0 5px;
        }
        .animal-card p {
            font-size: 0.9em;
            color: #666;
        }
        .animal-card a {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        footer {
            text-align: center;
            padding: 1em;
            background-color: #e0e0e0;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<header>
    <h1>流浪动物领养平台</h1>
    <nav>
        <a href="index.html">首页</a>
        <a href="list.html">领养动物</a>
        <a href="volunteer.html">志愿者活动</a>
        <a href="login.html">登录/注册</a>
    </nav>
</header>
<main>
    <section class="banner">欢迎关注流浪动物，让爱不再流浪！</section>
    <section class="search">
        <input type="text" placeholder="搜索动物">
        <button>搜索</button>
    </section>
    <section class="animal-cards">
        <!-- 动物卡片示例 -->
        <div class="animal-card">
            <img src="cat1.jpg" alt="猫咪">
            <h3>小橘</h3>
            <p>橘猫，1岁，健康</p>
            <a href="detail.html">查看详情</a>
        </div>
    </section>
</main>
<footer>
    <p>&copy; 2025 流浪动物领养平台 | 联系我们: info@adopt.com</p>
</footer>
</body>
</html>
