<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - 页面丢失了</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 10rem;
      animation: bounce 1.5s infinite alternate;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    a {
      display: inline-block;
      padding: 12px 24px;
      background-color: #ffcc00;
      color: #000;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    a:hover {
      transform: scale(1.1);
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    .glow {
      text-shadow: 0 0 10px #ffcc00, 0 0 20px #ffcc00;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.05;
      z-index: -1;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <h1 class="glow">404</h1>
  <h2>页面走丢了...</h2>
  <p>你访问的页面可能被吃掉了，或者压根就没出生。</p>
  <a href="/">返回首页</a>

</body>
</html>
