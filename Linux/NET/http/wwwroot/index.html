<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻想战域 - 首页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      color: #fff;
      background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
    }

    header {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 24px;
      color: #ffcc00;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ffcc00;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      background-image: url('https://images.unsplash.com/photo-1608138459076-e9cc3d92c2b0?auto=format&fit=crop&w=1500&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.5);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: auto;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .hero button {
      background-color: #ffcc00;
      color: #000;
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .hero button:hover {
      transform: scale(1.1);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      padding: 60px 40px;
      gap: 40px;
    }

    .feature {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      transition: background 0.3s;
    }

    .feature:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .feature h3 {
      margin-bottom: 15px;
      font-size: 22px;
      color: #ffcc00;
    }

    footer {
      background-color: rgba(0, 0, 0, 0.8);
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <h1>幻想战域</h1>
    <nav>
      <a href="#">首页</a>
      <a href="#">游戏特色</a>
      <a href="#">下载</a>
      <a href="#">联系我们</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h2>进入幻想的战斗世界</h2>
      <p>探索神秘大陆，召唤你的英雄，挑战来自异界的强敌！</p>
      <button>立即开始</button>
    </div>
  </section>

  <section class="features">
    <div class="feature">
      <h3>🔥 多人实时战斗</h3>
      <p>与全球玩家同台竞技，体验热血竞技快感。</p>
    </div>
    <div class="feature">
      <h3>🎮 高自由度玩法</h3>
      <p>角色成长、宠物养成、装备打造，战术千变万化。</p>
    </div>
    <div class="feature">
      <h3>🌍 绝美幻想世界</h3>
      <p>沉浸式剧情与震撼画面，开启你的冒险之旅。</p>
    </div>
  </section>

  <footer>
    &copy; 2025 幻想战域工作室 | 保留所有权利
  </footer>

</body>
</html>
